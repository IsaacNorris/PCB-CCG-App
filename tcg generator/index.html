<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCG Card Generator</title>
    <link rel="stylesheet" href="styles.css">`n    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>TCG Card Generator</h1>
        <div class="editor">
            <div class="form-section">
                <h2>Card Configuration</h2>
                <div class="form-group">
                    <label for="card-name">Card Name:</label>
                    <input type="text" id="card-name" placeholder="Enter card name">
                </div>
                <div class="form-group">
                    <label for="card-health">Health:</label>
                    <input type="number" id="card-health" placeholder="Enter health value">
                </div>
                <div class="form-group">
                    <label for="card-abilities">Abilities/Skills:</label>
                    <textarea id="card-abilities" placeholder="Enter abilities and skills"></textarea>
                </div>
                <div class="form-group">
                    <label for="card-description">Description:</label>
                    <textarea id="card-description" placeholder="Enter card description"></textarea>
                </div>
                <div class="form-group">
                    <label for="card-image">Upload Image:</label>
                    <input type="file" id="card-image" accept="image/*">
                </div>
            </div>
            <div class="preview-section">
                <h2>Card Preview</h2>`n                <button id="download-btn">Download Card as PNG</button>
                <div class="card-preview">
                    <div class="card-header">
                        <h3 id="preview-name">Card Name</h3>
                        <div class="card-stats">
                            <span id="preview-health">Health: 0</span>
                        </div>
                    </div>
                    <div class="card-image">
                        <img id="preview-image" src="" alt="Card Image" style="display: none;">
                        <div id="image-placeholder">No image uploaded</div>
                    </div>
                    <div class="card-content">
                        <div class="card-abilities">
                            <h4>Abilities</h4>
                            <p id="preview-abilities">No abilities set</p>
                        </div>
                        <div class="card-description">
                            <h4>Description</h4>
                            <p id="preview-description">No description set</p>
                        </div>
                    </div>
                </div>
                    </div>
                    <div class="card-content">
                        <h3 id="preview-name">Card Name</h3>
                        <div class="card-stats">
                            <span id="preview-health">Health: 0</span>
                        </div>
                        <div class="card-abilities">
                            <h4>Abilities</h4>
                            <p id="preview-abilities">No abilities set</p>
                        </div>
                        <div class="card-description">
                            <h4>Description</h4>
                            <p id="preview-description">No description set</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
