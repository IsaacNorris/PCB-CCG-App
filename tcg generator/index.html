<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCG Card Generator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>TCG Card Generator</h1>
        <div class="editor">
            <div class="form-section">
                <h2>Card Configuration</h2>
                <div class="form-group">
                    <label for="card-name">Card Name:</label>
                    <input type="text" id="card-name" placeholder="Enter card name">
                </div>
                <div class="form-group">
                    <label for="card-health">Health:</label>
                    <input type="number" id="card-health" placeholder="Enter health value">
                </div>
                <div class="form-group">
                    <label>Abilities/Skills:</label>
                    <div id="abilities-input-list">
                        <div class="ability-row">
                            <input type="text" class="ability-label-input" placeholder="Ability label">
                            <input type="text" class="ability-description-input" placeholder="Ability description">
                        </div>
                    </div>
                    <button type="button" id="add-ability-btn">Add Ability</button>
                </div>
                <div class="form-group small-desc-inputs">
                    <input type="text" id="card-description-small-1" placeholder="Extra description 1">
                    <input type="text" id="card-description-small-2" placeholder="Extra description 2">
                </div>
                <div class="form-group">
                    <label for="card-image">Upload Image:</label>
                    <input type="file" id="card-image" accept="image/*">
                </div>
            </div>
            <div class="preview-section">
                <h2>Card Preview</h2>
                <button id="download-btn">Download Card as PNG</button>
                <div class="card-preview">
                    <div class="card-header">
                        <h3 id="preview-name">Card Name</h3>
                        <div class="card-stats">
                            <span id="preview-health">0HP</span>
                        </div>
                    </div>
                    <div class="card-image">
                        <img id="preview-image" src="" alt="Card Image" style="display: none;">
                        <div id="image-placeholder">No image uploaded</div>
                    </div>
                    <div class="card-content">
                        <div class="card-abilities">
                            <ul id="preview-abilities-list">
                                <li>No abilities set</li>
                            </ul>
                        </div>
                        <div class="card-mini-descriptions">
                            <p id="preview-description-small-1"></p>
                            <p id="preview-description-small-2"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
